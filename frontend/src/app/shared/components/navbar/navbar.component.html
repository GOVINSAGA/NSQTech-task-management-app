<nav class="navbar" id="main-navbar">
  <div class="navbar-inner">
    <a routerLink="/dashboard" class="navbar-brand">
      <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="10" fill="url(#nav-logo)"/>
        <path d="M12 28V12h4l6 10 6-10h4v16h-4V18l-6 10-6-10v10h-4z" fill="#0a1a1f"/>
        <defs>
          <linearGradient id="nav-logo" x1="0" y1="0" x2="40" y2="40">
            <stop stop-color="#b794f4"/>
            <stop offset="1" stop-color="#81e6d9"/>
          </linearGradient>
        </defs>
      </svg>
      <span class="brand-text">NSQTech</span>
    </a>

    <div class="navbar-links">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-link" id="nav-dashboard">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      @if (authService.isAdmin()) {
        <a routerLink="/admin" routerLinkActive="active" class="nav-link" id="nav-admin">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
          Admin
        </a>
      }
    </div>

    <div class="navbar-user">
      <div class="user-info">
        <span class="user-name">{{ authService.userDisplayName() }}</span>
        <span [class]="authService.isAdmin() ? 'badge badge-role-admin' : 'badge badge-role-general'" style="font-size: 0.6rem;">
          {{ authService.currentUser()?.role }}
        </span>
      </div>
      <button class="btn btn-secondary btn-sm" (click)="logout()" id="logout-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </div>
  </div>
</nav>
